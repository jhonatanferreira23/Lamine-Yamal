<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gavião Preto e Branco</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Gavião Preto e Branco</h1>

    <div class="card" id="card">
      
      <!-- SVG estilizado de um gavião -->
      <svg viewBox="0 0 220 220" class="hawk">
        <!-- asas -->
        <path d="M110 90
                 C70 60, 40 70, 20 90
                 C50 95, 70 110, 90 120
                 C70 140, 50 160, 30 180
                 C70 170, 90 150, 110 130
                 C130 150, 150 170, 190 180
                 C170 160, 150 140, 130 120
                 C150 110, 170 95, 200 90
                 C180 70, 150 60, 110 90 Z"
              fill="black"/>

        <!-- corpo -->
        <ellipse cx="110" cy="115" rx="18" ry="35" fill="black"/>

        <!-- cabeça -->
        <circle cx="110" cy="80" r="10" fill="black"/>

        <!-- olho -->
        <circle cx="113" cy="78" r="2" fill="white"/>

        <!-- bico -->
        <path d="M120 82 L135 88 L120 90 Z" fill="black"/>
      </svg>

    </div>

    <button id="btn">Ativar efeito</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
